name: Build InstaGuard APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-dev build-essential git autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev openjdk-17-jdk libltdl-dev unzip zip
      - name: Build APK
        run: |
          pip install buildozer cython virtualenv
          buildozer android debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: InstaGuard-APK
          path: bin/*.apk
          retention-days: 30
