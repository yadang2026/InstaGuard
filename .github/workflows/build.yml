name: Build APK
on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - run: rm -rf InstaGuard/ **/__pycache__/ 2>/dev/null
      - uses: actions/setup-python@v5
        with: {python-version: '3.10'}
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip python3-dev git autoconf libtool pkg-config zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev openjdk-17-jdk unzip zip
          pip install buildozer cython
          # AGP will use bundled Gradle wrapper
      - name: Patch p4a (kivy recipe + gradle template)
        run: |
          P4A_DIR=".buildozer/android/platform/python-for-android"
          for i in 1 2 3 4 5 6 7 8; do
            r="$P4A_DIR/pythonforandroid/recipes/kivy/__init__.py"
            if [ -f "$r" ]; then
              # Fix 1: Remove legacy android pkg from kivy depends (pyjnius kept, needed at runtime)
              sed -i "s/'android', //g; s/, 'android'//g; s/'android', //g; s/, 'android'//g" "$r"
              echo "Kivy recipe: $(grep depends $r)"
              
              # Fix 2: Fix gradle template (replace com.android.internal.application)
              g="$P4A_DIR/pythonforandroid/bootstraps/sdl2/build.template.gradle"
              if [ -f "$g" ]; then
                sed -i 's/com.android.internal.application/com.android.application/g' "$g"
                echo "Gradle template patched"
              fi
              break
            fi
            echo "Waiting... attempt $i"
            sleep 30
          done
      - name: Set Java 17
        run: |
          sudo update-java-alternatives -s java-17-openjdk-amd64 2>/dev/null || true
          echo "JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))" >> $GITHUB_ENV
          export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
          java -version

      - run: buildozer -v android debug
        timeout-minutes: 30
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      - uses: actions/upload-artifact@v4
        with: {name: APK, path: bin/*.apk}
